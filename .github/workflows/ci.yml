name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Windows / Python 3.12
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          enable-cache: true

      - name: Sync locked environment
        run: uv sync --locked --dev

      - name: Check generated operation artifacts
        run: uv run python scripts/generate_manifest.py --check-python --check-corpus

      - name: Validate plugin, marketplace, and skill metadata
        run: uv run pytest tests/release

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright

      - name: Test without a live CMO instance
        run: uv run pytest -m "not cmo_live" --ignore=tests/release

      - name: Build and verify release artifacts
        shell: pwsh
        run: ./scripts/build_release.ps1
